name: Feature request
description: Suggest an improvement to the handoff protocol
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What delegation or handoff-continuity case does the protocol handle poorly today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like. Handoff is a protocol over existing primitives, not a framework — proposals that keep it that way are easier to adopt.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
